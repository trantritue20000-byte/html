<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - Code Live Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding: 15px; font-family: monospace; background: #1e1e1e; color: #fff; }
    h2 { margin-bottom: 10px; font-family: sans-serif; font-size: 18px; color: #4caf50; }
    textarea {
      width: 100%;
      height: 65vh;
      background: #252526;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      resize: vertical;
      outline: none;
    }
    .btn-group { margin-top: 10px; display: flex; gap: 10px; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-save { background: #007acc; color: white; }
    .btn-save:active { background: #005999; }
    #status { margin-top: 10px; font-size: 13px; color: #888; font-family: sans-serif; }
  </style>
</head>
<body>

  <h2>⚡ HTML Live Editor</h2>
  <textarea id="code-input" placeholder="Nhập mã HTML/CSS/JS vào đây..."></textarea>
  
  <div class="btn-group">
    <button class="btn-save" id="btn-save">🚀 LƯU & CẬP NHẬT APP</button>
  </div>
  <div id="status">Đang kết nối Firebase...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHACN3BbqHb_G8BvdR5USrFRot97OxYFI",
      authDomain: "html-fae6a.firebaseapp.com",
      databaseURL: "https://html-fae6a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "html-fae6a",
      storageBucket: "html-fae6a.firebasestorage.app",
      messagingSenderId: "355159856756",
      appId: "1:355159856756:web:d427d5cdb986bc04812321",
      measurementId: "G-GN9WM6EKYX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const codeRef = ref(db, 'live_code');

    const codeInput = document.getElementById('code-input');
    const btnSave = document.getElementById('btn-save');
    const status = document.getElementById('status');

    // Tải code hiện tại từ Firebase về Editor khi vừa mở
    get(codeRef).then((snapshot) => {
      if (snapshot.exists()) {
        codeInput.value = snapshot.val();
      }
      status.innerText = "Đã tải code mới nhất từ Firebase.";
    }).catch(err => {
      status.innerText = "Lỗi tải dữ liệu: " + err.message;
    });

    // Sự kiện Lưu code lên Firebase
    btnSave.addEventListener('click', () => {
      const code = codeInput.value;
      status.innerText = "Đang đồng bộ...";
      
      set(codeRef, code)
        .then(() => {
          status.innerText = "✅ Đã lưu thành công! App trên màn hình sẽ cập nhật ngay lập tức.";
        })
        .catch((err) => {
          status.innerText = "❌ Lỗi khi lưu: " + err.message;
        });
    });
  </script>
</body>
</html>
