<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - Code Live Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding: 15px; font-family: monospace; background: #1e1e1e; color: #fff; min-height: 100vh; }
    
    /* Giao diện Màn hình khóa mật khẩu */
    #lock-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #121212;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .lock-box {
      background: #252526;
      padding: 30px 25px;
      border-radius: 12px;
      border: 1px solid #333;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      max-width: 340px;
      width: 90%;
    }
    .lock-box h3 { font-family: sans-serif; color: #4caf50; margin-bottom: 15px; font-size: 18px; }
    .lock-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      border-radius: 6px;
      font-size: 16px;
      text-align: center;
      margin-bottom: 15px;
      outline: none;
    }
    .lock-box button {
      width: 100%;
      padding: 12px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    .lock-box button:active { background: #005999; }
    #lock-error { color: #f44336; font-family: sans-serif; font-size: 13px; margin-top: 10px; display: none; }

    /* Nội dung Editor */
    #editor-content { display: none; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    h2 { font-family: sans-serif; font-size: 18px; color: #4caf50; }
    
    textarea {
      width: 100%;
      height: 45vh;
      background: #252526;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-family: 'Courier New', Courier, monospace;
      resize: vertical;
      outline: none;
    }

    .btn-group { margin-top: 10px; display: flex; gap: 10px; }
    button {
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save { flex: 2; background: #007acc; color: white; }
    .btn-save:active { background: #005999; }
    .btn-fetch { flex: 1; background: #3c3c3c; color: #ccc; }
    .btn-fetch:active { background: #555; }

    #status { 
      margin: 10px 0; 
      font-size: 13px; 
      color: #aaa; 
      font-family: sans-serif; 
      min-height: 18px;
    }

    /* Khung Live Preview xem trước nhanh */
    .preview-title { font-family: sans-serif; font-size: 14px; color: #888; margin: 15px 0 5px 0; }
    #preview-frame {
      width: 100%;
      height: 25vh;
      background: white;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>
<body>

  <!-- 🔒 MÀN HÌNH KHÓA MẬT KHẨU -->
  <div id="lock-screen">
    <div class="lock-box">
      <h3>🔒 YÊU CẦU MẬT KHẨU</h3>
      <input type="password" id="pass-input" placeholder="Nhập mật khẩu..." autocomplete="off">
      <button id="btn-login">XÁC NHẬN</button>
      <div id="lock-error">Mật khẩu không chính xác!</div>
    </div>
  </div>

  <!-- ⚡ GIAO DIỆN EDITOR -->
  <div id="editor-content">
    <div class="header">
      <h2>⚡ HTML Live Editor</h2>
    </div>

    <textarea id="code-input" placeholder="Nhập mã HTML/CSS/JS của bạn vào đây..."></textarea>
    
    <div class="btn-group">
      <button class="btn-fetch" id="btn-fetch">🔄 TẢI CODE MỚI</button>
      <button class="btn-save" id="btn-save">🚀 LƯU & CẬP NHẬT APP</button>
    </div>

    <div id="status">Đang kết nối tới Firebase...</div>

    <div class="preview-title">👁️ Xem trước (Live Preview):</div>
    <iframe id="preview-frame"></iframe>
  </div>

  <script>
    // 🛑 CHỐNG F12 & ĐỌC MÃ NGUỒN TRÊN BÀN PHÍM / CHUỘT
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    document.addEventListener('keydown', e => {
      // Chặn F12
      if (e.keyCode === 123) e.preventDefault();
      // Chặn Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C
      if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) e.preventDefault();
      // Chặn Ctrl+U (Xem nguồn trang)
      if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
      // Chặn Cmd (Mac)
      if (e.metaKey && e.altKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) e.preventDefault();
    });

    // Vòng lặp vô hạn bẫy Debugger nếu cố tình dùng DevTools
    setInterval(() => {
      const startTime = performance.now();
      (function(){}).constructor("debugger")();
      if (performance.now() - startTime > 100) {
        document.body.innerHTML = "<h2 style='color:red;text-align:center;padding:50px;'>CẢNH BÁO: PHÁT HIỆN HÀNH VI SOI CODE!</h2>";
      }
    }, 1000);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Mật khẩu xác thực
    const CORRECT_PASSWORD = "0904";

    const lockScreen = document.getElementById('lock-screen');
    const editorContent = document.getElementById('editor-content');
    const passInput = document.getElementById('pass-input');
    const btnLogin = document.getElementById('btn-login');
    const lockError = document.getElementById('lock-error');

    // Hàm xác thực mật khẩu
    function verifyPassword() {
      if (passInput.value.trim() === CORRECT_PASSWORD) {
        lockScreen.style.display = 'none';
        editorContent.style.display = 'block';
        fetchCodeFromFirebase();
      } else {
        lockError.style.display = 'block';
        passInput.value = '';
      }
    }

    btnLogin.addEventListener('click', verifyPassword);
    passInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') verifyPassword();
    });

    // Cấu hình Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCHACN3BbqHb_G8BvdR5USrFRot97OxYFI",
      authDomain: "html-fae6a.firebaseapp.com",
      databaseURL: "https://html-fae6a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "html-fae6a",
      storageBucket: "html-fae6a.firebasestorage.app",
      messagingSenderId: "355159856756",
      appId: "1:355159856756:web:d427d5cdb986bc04812321",
      measurementId: "G-GN9WM6EKYX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const codeRef = ref(db, 'live_code');

    const codeInput = document.getElementById('code-input');
    const btnSave = document.getElementById('btn-save');
    const btnFetch = document.getElementById('btn-fetch');
    const status = document.getElementById('status');
    const previewFrame = document.getElementById('preview-frame');

    function updatePreview() {
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(codeInput.value);
      doc.close();
    }

    codeInput.addEventListener('input', updatePreview);

    function fetchCodeFromFirebase() {
      status.style.color = "#aaa";
      status.innerText = "⏳ Đang tải code từ Firebase...";
      get(codeRef).then((snapshot) => {
        if (snapshot.exists()) {
          codeInput.value = snapshot.val();
          updatePreview();
          status.style.color = "#4caf50";
          status.innerText = "✅ Đã tải code mới nhất từ hệ thống.";
        } else {
          status.innerText = "⚠️ Chưa có dữ liệu trên Firebase. Bạn hãy nhập code và bấm Lưu!";
        }
      }).catch(err => {
        status.style.color = "#f44336";
        status.innerText = "❌ Lỗi kết nối: " + err.message;
      });
    }

    btnFetch.addEventListener('click', fetchCodeFromFirebase);

    btnSave.addEventListener('click', () => {
      const code = codeInput.value;
      status.style.color = "#aaa";
      status.innerText = "⏳ Đang đẩy code lên App...";
      
      set(codeRef, code)
        .then(() => {
          status.style.color = "#4caf50";
          status.innerText = "🎉 LƯU THÀNH CÔNG! App trên màn hình chính đã cập nhật.";
        })
        .catch((err) => {
          status.style.color = "#f44336";
          status.innerText = "❌ Lỗi khi lưu: " + err.message;
        });
    });
  </script>
</body>
</html>
