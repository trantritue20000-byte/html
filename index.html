<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaoTSB - PVP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { width: 100%; height: 100%; background-color: #0b0f19; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    #app-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <!-- CONTAINER CHẠY CODE REALTIME TỪ ED.HTML -->
  <div id="app-container"></div>

  <!-- FIREBASE REALTIME LISTENER -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHACN3BbqHb_G8BvdR5USrFRot97OxYFI",
      authDomain: "html-fae6a.firebaseapp.com",
      databaseURL: "https://html-fae6a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "html-fae6a",
      storageBucket: "html-fae6a.firebasestorage.app",
      messagingSenderId: "355159856756",
      appId: "1:355159856756:web:d427d5cdb986bc04812321",
      measurementId: "G-GN9WM6EKYX"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const codeRef = ref(db, 'live_code');
    const appContainer = document.getElementById('app-container');

    // Lắng nghe thay đổi Realtime từ ed.html
    onValue(codeRef, (snapshot) => {
      const htmlContent = snapshot.val() || "<h3 style='padding:20px; color:#94a3b8; text-align:center;'>Chưa có code nào. Nhập code từ ed.html nhé!</h3>";
      appContainer.innerHTML = htmlContent;

      // Kích hoạt lại toàn bộ thẻ <script> có trong code nhận về
      Array.from(appContainer.querySelectorAll("script")).forEach(oldScript => {
        const newScript = document.createElement("script");
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    });
  </script>
</body>
</html>
